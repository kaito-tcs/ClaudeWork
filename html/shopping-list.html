<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おかいものリスト</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/shopping-list.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="header-label">My Shopping List</div>
        <h1>おかいもの<br>リスト</h1>
        <div class="progress-area">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <span class="progress-text" id="progressText">0 / 0 完了</span>
        </div>
    </div>

    <div class="view-tabs">
        <button class="view-tab active" data-view="list" onclick="switchView('list')">🛒 リスト</button>
        <button class="view-tab" data-view="history" onclick="switchView('history')">📊 履歴・グラフ</button>
    </div>

    <!-- List view -->
    <div id="viewList">
        <div class="add-form">
            <div class="form-row">
                <div class="input-group input-name">
                    <label>商品名</label>
                    <input type="text" id="itemName" placeholder="例：トマト" autocomplete="off">
                </div>
                <div class="input-group input-qty">
                    <label>数量</label>
                    <input type="number" id="itemQty" value="1" min="1" max="99">
                </div>
                <div class="input-group input-cat">
                    <label>カテゴリ</label>
                    <select id="itemCat">
                        <option value="veggie">🥦 野菜・果物</option>
                        <option value="meat">🥩 肉・魚</option>
                        <option value="drink">🥛 飲み物・乳製品</option>
                        <option value="bread">🍞 パン・穀物</option>
                        <option value="other">🛒 その他</option>
                    </select>
                </div>
                <button class="btn-add" onclick="addItem()">＋ 追加</button>
            </div>
            <button class="btn-ocr-open" onclick="openOCR()">📷 画像から読み込む（手書きリスト・レシート）</button>
        </div>

        <div class="filter-tabs">
            <div class="filter-tab active" data-cat="all"    onclick="setFilter('all')">すべて</div>
            <div class="filter-tab" data-cat="veggie" onclick="setFilter('veggie')">🥦 野菜・果物</div>
            <div class="filter-tab" data-cat="meat"   onclick="setFilter('meat')">🥩 肉・魚</div>
            <div class="filter-tab" data-cat="drink"  onclick="setFilter('drink')">🥛 飲み物・乳製品</div>
            <div class="filter-tab" data-cat="bread"  onclick="setFilter('bread')">🍞 パン・穀物</div>
            <div class="filter-tab" data-cat="other"  onclick="setFilter('other')">🛒 その他</div>
        </div>

        <div class="list-area" id="listArea"></div>
    </div>

    <!-- History view -->
    <div id="viewHistory" style="display:none">
        <div class="history-toolbar">
            <div class="history-search">
                <input type="month" id="searchMonth" class="search-input" title="年月で絞り込み" oninput="applyHistoryFilter()">
                <input type="date"  id="searchDate"  class="search-input" title="日付で絞り込み"  oninput="applyHistoryFilter()">
                <input type="text"  id="searchLocation" class="search-input" placeholder="📍 購入場所で検索" oninput="applyHistoryFilter()">
                <button class="btn-clear-search" onclick="clearSearch()">クリア</button>
            </div>
            <div class="history-export">
                <button class="btn-export" onclick="exportCSV()">⬇ CSV</button>
                <button class="btn-export" onclick="exportPDF()">🖨 PDF</button>
            </div>
        </div>
        <div id="historyArea"></div>
    </div>

</div>

<!-- Purchase modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-handle"></div>
        <h3>購入を記録</h3>
        <p class="modal-item-name" id="modalItemName"></p>
        <div class="modal-fields">
            <div class="modal-field">
                <label>金額（円）</label>
                <input type="number" id="modalPrice" placeholder="例：128" min="0">
            </div>
            <div class="modal-field">
                <label>購入場所</label>
                <input type="text" id="modalLocation" placeholder="例：スーパー田中">
            </div>
            <div class="modal-field">
                <label>購入日</label>
                <input type="date" id="modalDate">
            </div>
        </div>
        <div class="modal-buttons">
            <button class="modal-btn" onclick="cancelModal()">キャンセル</button>
            <button class="modal-btn" onclick="skipRecord()">スキップ</button>
            <button class="modal-btn primary" onclick="confirmRecord()">記録して完了</button>
        </div>
    </div>
</div>

<!-- OCR Modal -->
<div class="modal-overlay" id="ocrOverlay">
    <div class="modal ocr-modal">
        <div class="modal-handle"></div>
        <div class="ocr-header">
            <h3>画像から読み込む</h3>
            <button class="ocr-close-btn" onclick="closeOCR()">
                <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
                    <path d="M1 1L10 10M10 1L1 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div class="ocr-mode-tabs">
            <button class="ocr-tab active" data-mode="list"    onclick="setOCRMode('list')">✏️ 手書きリスト</button>
            <button class="ocr-tab"        data-mode="receipt" onclick="setOCRMode('receipt')">🧾 レシート</button>
        </div>

        <!-- 入力フェーズ -->
        <div id="ocrPhaseInput">
            <label class="ocr-file-label" for="ocrFile">
                <div class="ocr-upload-icon">📷</div>
                <div class="ocr-upload-text">タップして撮影 / 画像を選択</div>
                <div class="ocr-upload-hint" id="ocrHint">文字は大きくはっきりと</div>
            </label>
            <input type="file" id="ocrFile" accept="image/*" style="display:none" onchange="handleOCRFile(this)">
        </div>

        <!-- 処理フェーズ -->
        <div id="ocrPhaseProcess" style="display:none">
            <img id="ocrPreview" class="ocr-preview-img" alt="preview">
            <div class="ocr-progress-wrap">
                <div class="ocr-prog-bar"><div class="ocr-prog-fill" id="ocrProgFill"></div></div>
                <span class="ocr-prog-text" id="ocrProgText">準備中...</span>
            </div>
        </div>

        <!-- 結果フェーズ -->
        <div id="ocrPhaseResults" style="display:none">
            <div class="ocr-results-hd">
                <span id="ocrResultsTitle">読み取り結果</span>
                <span class="ocr-results-count" id="ocrResultsCount"></span>
            </div>
            <div id="ocrResultsList" class="ocr-results-list"></div>
            <div class="modal-buttons" style="margin-top:1rem">
                <button class="modal-btn" onclick="resetOCR()">やり直し</button>
                <button class="modal-btn primary" id="ocrApplyBtn" onclick="applyOCRResults()">リストに追加</button>
            </div>
        </div>
    </div>
</div>

<script src="../js/shopping-list.js"></script>
</body>
</html>
